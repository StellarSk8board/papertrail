appId: com.papertrail.app
productName: PaperTrail
icon: build/icon.png
directories:
  output: dist
files:
  - electron/**/*
  - dist-renderer/**/*
  - build/icon.png
  - build/icon.icns
  - build/icon.ico
# Native .node binaries must live outside the asar archive so the OS
# dynamic linker can load them at runtime (dlopen cannot open files inside asar).
asarUnpack:
  - "**/*.node"
# Rebuild native modules (e.g. better-sqlite3) against the correct Electron
# ABI during packaging.  This replaces any dev-machine binary with the right one.
npmRebuild: true
publish:
  provider: github
  owner: StellarSk8board
  repo: papertrail
  private: false
mac:
  icon: build/icon.icns
  category: public.app-category.developer-tools
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  notarize: true
  target:
    - dmg
    - zip
win:
  # Multi-resolution ICO generated by: npm run generate-ico
  icon: build/icon.ico
  # asInvoker: do not request elevation — avoids unnecessary UAC prompts.
  requestedExecutionLevel: asInvoker
  target:
    - nsis
linux:
  target:
    - AppImage
nsis:
  oneClick: true
  perMachine: false
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: PaperTrail
